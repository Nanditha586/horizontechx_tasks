<!DOCTYPE html>
<html>
<head>
<title>Create Task</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
}

.navbar{
    background:#1f2937;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    background:#2563eb;
    padding:10px 15px;
    border-radius:8px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:85vh;
}

.card{
    background:white;
    width:700px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
    text-align:center;
    margin-bottom:25px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

</style>
</head>

<body>

<div class="navbar">

<h2>{{ project.project_name }}</h2>

<a href="{% url 'board_view' project.id %}">
Back To Board
</a>

</div>

<div class="container">

<div class="card">

<h2>Create Task</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Create Task

</button>

</form>

</div>

</div>

</body>
</html>
