<!DOCTYPE html>
<html>
<head>
<title>Edit Task</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f6f9;
}

.navbar{
background:#1f2937;
color:white;
padding:15px 40px;
display:flex;
justify-content:space-between;
}

.navbar a{
background:#2563eb;
padding:10px 15px;
border-radius:8px;
color:white;
text-decoration:none;
}

.container{
display:flex;
justify-content:center;
align-items:center;
min-height:85vh;
}

.card{
background:white;
width:700px;
padding:35px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
text-align:center;
margin-bottom:25px;
}

input,
select,
textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
background:#2563eb;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<h2>Edit Task</h2>

<a href="{% url 'board_view' task.project.id %}">
Back
</a>

</div>

<div class="container">

<div class="card">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Update Task

</button>

</form>

</div>

</div>

</body>
</html>
