<!DOCTYPE html>
<html>
<head>

<title>Edit Comment</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f6f9;
}

/* Navbar */

.navbar{
    background:#1f2937;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.navbar a{
    text-decoration:none;
    color:white;
    background:#2563eb;
    padding:10px 15px;
    border-radius:8px;
}

/* Form Container */

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:85vh;
}

.card{
    background:white;
    width:700px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h2{
    text-align:center;
    margin-bottom:25px;
    color:#1f2937;
}

textarea{
    width:100%;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    resize:none;
    font-size:15px;
}

.btn-group{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.save-btn{
    flex:1;
    background:#22c55e;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.cancel-btn{
    flex:1;
    background:#ef4444;
    color:white;
    text-decoration:none;
    text-align:center;
    padding:12px;
    border-radius:8px;
}

</style>

</head>

<body>

<div class="navbar">

    <h2>Edit Comment</h2>

    <a href="javascript:history.back()">
        Back
    </a>

</div>

<div class="container">

    <div class="card">

        <h2>Update Your Comment</h2>

        <form method="POST">

            {% csrf_token %}

            <textarea
                name="comment_text"
                rows="6"
                required>{{ comment.comment_text }}</textarea>

            <div class="btn-group">

                <button
                    type="submit"
                    class="save-btn">

                    Save Changes

                </button>

                <a
                    href="javascript:history.back()"
                    class="cancel-btn">

                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
