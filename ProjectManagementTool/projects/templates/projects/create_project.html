<!DOCTYPE html>
<html>
<head>
    <title>Create Project</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Navbar */

        .navbar{
            background:#1f2937;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
        }

        .navbar h2{
            font-size:24px;
        }

        .nav-links{
            display:flex;
            gap:15px;
        }

        .nav-btn{
            text-decoration:none;
            color:white;
            padding:10px 18px;
            border-radius:8px;
        }

        .dashboard-btn{
            background:#2563eb;
        }

        .logout-btn{
            background:#ef4444;
        }

        /* Container */

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:85vh;
        }

        .card{
            background:white;
            width:600px;
            padding:35px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .card h2{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        form p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:5px;
            font-weight:600;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:8px;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:120px;
        }

        input:focus,
        textarea:focus{
            outline:none;
            border-color:#2563eb;
        }

        .create-btn{
            width:100%;
            border:none;
            padding:12px;
            background:#2563eb;
            color:white;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        .create-btn:hover{
            background:#1d4ed8;
        }

    </style>
</head>

<body>

<nav class="navbar">

    <h2>Project Management Tool</h2>

    <div class="nav-links">

        <a href="{% url 'analytics_dashboard' %}"
           class="nav-btn dashboard-btn">
            Dashboard
        </a>
        <a href="{%url 'project_list' %}" class="nav-btn dashboard-btn">
            View Projects
        </a>
        

        <a href="{% url 'logout' %}"
           class="nav-btn logout-btn">
            Logout
        </a>

    </div>

</nav>

<div class="container">

    <div class="card">

        <h2>Create Project</h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="create-btn">

                Create Project

            </button>

        </form>

    </div>

</div>

</body>
</html>
