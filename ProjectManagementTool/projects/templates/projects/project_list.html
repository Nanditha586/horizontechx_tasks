<!DOCTYPE html>
<html>
<head>
    <title>My Projects</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Navbar */

        .navbar{
            background:#1f2937;
            color:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
        }

        .navbar h2{
            font-size:24px;
        }

        .nav-links{
            display:flex;
            gap:15px;
        }

        .nav-btn{
            text-decoration:none;
            color:white;
            padding:10px 18px;
            border-radius:8px;
        }

        .create-btn{
            background:#22c55e;
        }
        .dashboard-btn{
            background:blue;
        }

        .logout-btn{
            background:#ef4444;
        }

        /* Content */

        .container{
            padding:40px;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
        }

        .header h1{
            color:#333;
        }

        .new-project-btn{
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:12px 20px;
            border-radius:8px;
        }

        .projects-grid{
            display:grid;
            grid-template-columns:
            repeat(auto-fill,minmax(320px,1fr));
            gap:20px;
        }

        .project-card{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .project-card:hover{
            transform:translateY(-5px);
        }

        .project-card h3{
            color:#2563eb;
            margin-bottom:10px;
        }

        .project-card p{
            color:#666;
            line-height:1.6;
        }

        .empty{
            text-align:center;
            margin-top:100px;
            color:#777;
            font-size:20px;
        }

    </style>
</head>

<body>

<nav class="navbar">

    <h2>Project Management Tool</h2>

    <div class="nav-links">

        <a href="{% url 'create_project' %}"
           class="nav-btn create-btn">
            + Project
        </a>

        <a href="{% url 'analytics_dashboard' %}"
           class="nav-btn dashboard-btn">
            Dashboard
        </a>

        <a href="{% url 'logout' %}"
           class="nav-btn logout-btn">
            Logout
        </a>

    </div>

</nav>

<div class="container">

    <div class="header">

        <h1>My Projects</h1>

        <a href="{% url 'create_project' %}"
           class="new-project-btn">
            Create New Project
        </a>

    </div>

    {% if projects %}

        <div class="projects-grid">

            {% for project in projects %}

                <div class="project-card">

                    <h3>
                        {{ project.project_name }}
                    </h3>

                    <p>
                        {{ project.description }}
                    </p>

                    <br>

                    <small>
                        Created:
                        {{ project.created_at }}
                    </small>
                    <br>
                    <br>
                    <br>
                    <a href="{% url 'board_view' project.id %}" class="nav-btn dashboard-btn">
    Open Board
</a>

                </div>

            {% endfor %}

        </div>

    {% else %}

        <div class="empty">

            No Projects Found

        </div>

    {% endif %}
    

</div>

</body>
</html>
